services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: freshflow
      POSTGRES_PASSWORD: freshflow
      POSTGRES_DB: freshflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freshflow -d freshflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://freshflow:freshflow@db:5432/freshflow
      LOG_LEVEL: debug
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
